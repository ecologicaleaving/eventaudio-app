name: eventaudio_app
description: "EventAudio — Visitor mobile app for multi-channel audio streaming at events."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # WebRTC + mediasoup SFU
  flutter_webrtc: ^0.12.0
  mediasoup_client_flutter: ^0.8.5

  # Networking
  http: ^1.1.0
  socket_io_client: ^2.0.3+1

  # Local storage
  shared_preferences: ^2.2.2

  # Permissions
  permission_handler: ^11.0.1

  # Background service
  flutter_foreground_task: ^6.0.0+1

  # UUID generation
  uuid: ^4.0.0

  # QR code scanner
  mobile_scanner: ^5.0.0

  # Fonts
  google_fonts: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  bloc_test: ^9.1.5
  build_runner: ^2.4.7

# Use local patched mediasoup_client_flutter to fix null-safety incompatibilities
# with webrtc_interface 1.3.0 (cname is String? in newer versions).
dependency_overrides:
  webrtc_interface: 1.3.0
  dart_webrtc: 1.6.0
  mediasoup_client_flutter:
    path: packages/mediasoup_client_flutter

flutter:
  uses-material-design: true
