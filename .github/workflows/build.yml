name: Build & Deploy APK
# ============================================================
# EventAudio App — Flutter CI/CD
#
# Secrets richiesti:
#   VPS_SSH_KEY          — chiave privata SSH (github-actions-deploy)
#   VPS_HOST             — IP VPS (46.225.60.101)
#   VPS_USER             — utente SSH (root)
#   TELEGRAM_BOT_TOKEN   — token bot deploy monitor
#   TELEGRAM_CHAT_ID     — chat ID canale notifiche
#
# Flusso:
#   push feature branch / PR → build APK debug → deploy test → notifica Telegram
#   push master → build APK debug → GitHub Release → notifica Telegram
# ============================================================

on:
  push:
    branches: ['main', 'master']
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    name: Build APK & Deploy
    runs-on: ubuntu-latest
    outputs:
      apk_name: ${{ steps.apk.outputs.name }}
      branch: ${{ steps.info.outputs.branch }}
      version: ${{ steps.info.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --no-pub

      - name: Extract version & branch info
        id: info
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K\d+' || echo "")
          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"         >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA"   >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER"   >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM"   >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          if [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST" ]; then
            echo "VPS secrets not configured — skipping SSH setup"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Build APK (debug arm64)
        run: flutter build apk --debug --target-platform android-arm64
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Find & rename APK
        id: apk
        run: |
          APK_PATH=$(find build -name "*.apk" 2>/dev/null | grep -v "intermediates\|test" | head -1)
          [ -z "$APK_PATH" ] && echo "ERROR: no APK found" && exit 1
          PR="${{ steps.info.outputs.pr_number }}"
          SHA="${{ steps.info.outputs.short_sha }}"
          REPO="${{ github.event.repository.name }}"
          [ -n "$PR" ] && APK_NAME="${REPO}-pr${PR}-${SHA}.apk" || APK_NAME="${REPO}-v${{ steps.info.outputs.version }}-${SHA}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Deploy APK to app-hub
        run: |
          if [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST" ]; then
            echo "VPS secrets not configured — skipping deploy"
            exit 0
          fi
          IS_MASTER="${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}"
          [ "$IS_MASTER" = "true" ] && DEST="release" || DEST="test"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$VPS_USER"@"$VPS_HOST" \
            "mkdir -p /var/www/app-hub/downloads/${DEST}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ steps.apk.outputs.name }}" \
            "$VPS_USER"@"$VPS_HOST":/var/www/app-hub/downloads/${DEST}/
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}

      - name: Mark deployed-test & move card to Test
        if: success()
        run: |
          if [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_HOST" ]; then
            echo "VPS secrets not configured — skipping card move"
            exit 0
          fi
          ISSUE="${{ steps.info.outputs.issue_num }}"
          REPO="${{ github.repository }}"
          if [ -n "$ISSUE" ]; then
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              "$VPS_USER"@"$VPS_HOST" \
              "export PATH=\$PATH:/root/go/bin && \
               gh issue edit $ISSUE --repo $REPO \
                 --remove-label review-ready \
                 --add-label deployed-test 2>/dev/null || true && \
               python3 /root/.openclaw/workspace-ciccio/scripts/project_board.py \
                 $REPO $ISSUE Test 2>/dev/null || true" || true
          fi
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}

      - name: Comment PR with APK link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const name = '${{ steps.apk.outputs.name }}';
            const url  = `https://apps.8020solutions.org/downloads/test/${name}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `📲 **APK pronto!**\n\n🔗 [${name}](${url})\n\n> Installa direttamente sul dispositivo Android.`
            });

      - name: Create GitHub Release (master only)
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: v${{ steps.info.outputs.version }}
          files: ${{ steps.apk.outputs.name }}

  notify:
    name: Notify Deploy (Telegram)
    needs: build-and-deploy
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          repository: ecologicaleaving/workflow
          path: workflow

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Send Telegram notification
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RAW_STATUS="${{ needs.build-and-deploy.result }}"
          [ "$RAW_STATUS" = "success" ] && STATUS="success" || STATUS="failed"

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VERSION="${{ needs.build-and-deploy.outputs.version }}"
          IS_MASTER="${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}"

          # Link diretto app-hub (stabile, non scade); fallback al run CI se build fallita
          APK_NAME="${{ needs.build-and-deploy.outputs.apk_name }}"
          if [ "$RAW_STATUS" = "success" ] && [ -n "$APK_NAME" ]; then
            [ "$IS_MASTER" = "true" ] && DEST="release" || DEST="test"
            LINK="https://apps.8020solutions.org/downloads/${DEST}/${APK_NAME}"
          else
            LINK="$RUN_URL"
          fi

          python workflow/scripts/deploy-notify.py \
            "${{ github.repository }}" \
            "build" \
            "$STATUS" \
            "${{ needs.build-and-deploy.outputs.branch }}" \
            "$RUN_URL" \
            "$LINK"
